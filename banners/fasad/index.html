<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Баннер — Падел Центр Арктика</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Manrope', sans-serif;
      padding: 40px;
    }

    .banner-wrap {
      width: 1400px;
      aspect-ratio: 7 / 3;
      position: relative;
    }

    .banner {
      width: 100%;
      height: 100%;
      background: #ffffff;
      display: flex;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.25);
    }

    /* LEFT */
    .left {
      flex: 1;
      padding: 48px 56px 48px 64px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .headline {
      font-size: 92px;
      font-weight: 900;
      line-height: 1.0;
      color: #0d2a8a;
      letter-spacing: -1px;
      text-transform: uppercase;
    }

    .divider-block {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin: 16px 0;
    }

    .gradient-line {
      height: 5px;
      width: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, #7ac43a 0%, #1e90d0 100%);
    }

    .subtitle {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: #6a8caf;
      text-transform: uppercase;
    }

    .phone {
      font-size: 68px;
      font-weight: 900;
      color: #0d2a8a;
      letter-spacing: -1px;
      line-height: 1;
    }

    /* RIGHT */
    .right {
      width: 360px;
      flex-shrink: 0;
      padding: 36px 40px 36px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      align-self: flex-end;
    }

    .logo-wrap img {
      height: 52px;
      width: auto;
    }

    .qr-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    #qrcode canvas, #qrcode img {
      border: 6px solid #fff;
      box-shadow: 0 0 0 2px #0d2a8a;
      border-radius: 4px;
    }

    .scan-label {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.14em;
      color: #0d2a8a;
      text-transform: uppercase;
    }

    .site-label {
      font-size: 24px;
      font-weight: 800;
      color: #0d2a8a;
      letter-spacing: -0.3px;
    }

    /* PRINT */
    @media print {
      body { background: none; padding: 0; }
      .banner-wrap { width: 100%; }
      .banner { box-shadow: none; border-radius: 0; }
    }
  </style>
</head>
<body>
  <div class="banner-wrap">
    <div class="banner">
      <!-- LEFT -->
      <div class="left">
        <div class="headline">ЗДЕСЬ ИГРАЮТ<br>В ПАДЕЛ</div>
        <div class="divider-block">
          <div class="gradient-line"></div>
          <div class="subtitle">ПАДЕЛ В ВИДНОМ</div>
        </div>
        <div class="phone">+7 925 088-91-96</div>
      </div>

      <!-- RIGHT -->
      <div class="right">
        <div class="logo-wrap">
          <img src="../nadin-padel-day/imeges/logo-arctika.png" alt="Падел Центр Арктика">
        </div>
        <div class="qr-block">
          <div id="qrcode"></div>
          <div class="scan-label">СКАНИРУЙ</div>
          <div class="site-label">padelvidnoe.ru</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    QRCode.toCanvas(document.createElement('canvas'), 'https://padelvidnoe.ru', {
      width: 200,
      margin: 2,
      color: { dark: '#0d2a8a', light: '#ffffff' }
    }, function(err, canvas) {
      if (!err) document.getElementById('qrcode').appendChild(canvas);
    });
  </script>
</body>
</html>
